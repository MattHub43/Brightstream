apiVersion: apps/v1
kind: Deployment
metadata:
  name: brightstream
spec:
  replicas: 2
  selector:
    matchLabels:
      app: brightstream
  template:
    metadata:
      labels:
        app: brightstream
    spec:
      containers:
        - name: brightstream
          image: georgem43/brightstream:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
